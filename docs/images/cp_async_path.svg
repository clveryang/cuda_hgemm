<svg width="680" height="420" viewBox="0 0 680 420" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>cp.async 的数据通路</title>
  <desc>同步拷贝要经过 L1 和寄存器再写入 shared memory，cp.async.cg 从 L2 直达 shared memory</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#656d76" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: -apple-system, "Segoe UI", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1f2328; }
      .th { font-size: 14px; font-weight: 500; }
      .t { font-size: 14px; }
      .ts { font-size: 12px; fill: #656d76; }
      .node { fill: #f6f8fa; stroke: #8c959f; }
      .bad { fill: #ffebe9; stroke: #ff8182; }
      .flow { stroke: #656d76; stroke-width: 1.5; }
    </style>
  </defs>

  <text class="th" x="80" y="50">同步拷贝（LDG + STS）</text>
  <rect class="node" x="80" y="65" width="160" height="44" rx="4"/>
  <text class="t" x="110" y="91">global memory</text>
  <line class="flow" x1="160" y1="112" x2="160" y2="132" marker-end="url(#arrow)"/>
  <rect class="node" x="80" y="135" width="160" height="44" rx="4"/>
  <text class="t" x="145" y="161">L2</text>
  <line class="flow" x1="160" y1="182" x2="160" y2="202" marker-end="url(#arrow)"/>
  <rect class="node" x="80" y="205" width="160" height="44" rx="4"/>
  <text class="t" x="145" y="231">L1</text>
  <line class="flow" x1="160" y1="252" x2="160" y2="272" marker-end="url(#arrow)"/>
  <rect class="bad" x="80" y="275" width="160" height="44" rx="4"/>
  <text class="t" x="115" y="301">线程寄存器</text>
  <line class="flow" x1="160" y1="322" x2="160" y2="342" marker-end="url(#arrow)"/>
  <rect class="node" x="80" y="345" width="160" height="44" rx="4"/>
  <text class="t" x="105" y="371">shared memory</text>
  <text class="ts" x="255" y="297">占寄存器、占指令槽</text>
  <text class="ts" x="255" y="314">线程必须干等数据回来</text>

  <text class="th" x="420" y="50">cp.async.cg</text>
  <rect class="node" x="420" y="65" width="160" height="44" rx="4"/>
  <text class="t" x="450" y="91">global memory</text>
  <line class="flow" x1="500" y1="112" x2="500" y2="132" marker-end="url(#arrow)"/>
  <rect class="node" x="420" y="135" width="160" height="44" rx="4"/>
  <text class="t" x="485" y="161">L2</text>
  <line x1="500" y1="182" x2="500" y2="342" stroke="#4ac26b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect class="node" x="420" y="345" width="160" height="44" rx="4"/>
  <text class="t" x="445" y="371">shared memory</text>
  <text class="ts" x="520" y="240">直达：绕过 L1</text>
  <text class="ts" x="520" y="257">和寄存器堆</text>
</svg>
