<svg width="680" height="480" viewBox="0 0 680 480" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>wmma_base 三级分块</title>
  <desc>一个 block 负责 C 的 256×128 区域，内部按 4 行 2 列分给 8 个 warp，每个 warp 的 64×64 区域又是 4×4 块 wmma 瓦片；shared memory 里缓存 A 的 256×32 条带和 B 的 128×32 条带</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#656d76" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: -apple-system, "Segoe UI", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1f2328; }
      .th { font-size: 14px; font-weight: 500; }
      .t { font-size: 14px; }
      .ts { font-size: 12px; fill: #656d76; }
      .cell { fill: #f6f8fa; stroke: #8c959f; }
      .grid { stroke: #d0d7de; stroke-width: 0.5; }
    </style>
  </defs>

  <text class="th" x="40" y="50">block 瓦片：C 的 256×128</text>
  <rect class="cell" x="40" y="60" width="200" height="320"/>
  <line class="grid" x1="140" y1="60" x2="140" y2="380"/>
  <line class="grid" x1="40" y1="140" x2="240" y2="140"/><line class="grid" x1="40" y1="220" x2="240" y2="220"/><line class="grid" x1="40" y1="300" x2="240" y2="300"/>
  <text class="t" x="75" y="105">W0</text><text class="t" x="75" y="185">W2</text><text class="t" x="75" y="265">W4</text><text class="t" x="75" y="345">W6</text>
  <text class="t" x="175" y="185">W3</text><text class="t" x="175" y="265">W5</text><text class="t" x="175" y="345">W7</text>
  <rect x="140" y="60" width="100" height="80" fill="#dafbe1" stroke="#4ac26b"/>
  <text class="th" x="172" y="105">W1</text>
  <line x1="245" y1="100" x2="295" y2="100" stroke="#656d76" stroke-width="1.5" marker-end="url(#arrow)"/>

  <text class="th" x="300" y="50">1 个 warp：64×64</text>
  <rect x="300" y="60" width="120" height="120" fill="#dafbe1" stroke="#4ac26b"/>
  <line class="grid" x1="330" y1="60" x2="330" y2="180"/><line class="grid" x1="360" y1="60" x2="360" y2="180"/><line class="grid" x1="390" y1="60" x2="390" y2="180"/>
  <line class="grid" x1="300" y1="90" x2="420" y2="90"/><line class="grid" x1="300" y1="120" x2="420" y2="120"/><line class="grid" x1="300" y1="150" x2="420" y2="150"/>
  <text class="ts" x="440" y="105">4×4 = 16 块</text>
  <text class="ts" x="440" y="122">wmma 16×16 瓦片</text>
  <text class="ts" x="440" y="139">C_frag[4][4] 常驻寄存器</text>

  <text class="th" x="300" y="235">shared memory 里的 K 条带（整个 block 共享）</text>
  <rect x="300" y="250" width="50" height="200" fill="#fff8c5" stroke="#d4a72c"/>
  <text class="ts" x="300" y="466">A 条带 256×32</text>
  <rect x="420" y="250" width="50" height="100" fill="#ddf4ff" stroke="#54aeff"/>
  <text class="ts" x="420" y="370">B 条带 128×32</text>
  <text class="ts" x="500" y="270">每轮外循环沿 K</text>
  <text class="ts" x="500" y="287">前进 32 个元素</text>
  <text class="ts" x="500" y="304">共 24 KB</text>
  <line x1="350" y1="250" x2="330" y2="185" stroke="#656d76" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="445" y1="250" x2="400" y2="185" stroke="#656d76" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="368" y="215">load_matrix_sync</text>
</svg>
